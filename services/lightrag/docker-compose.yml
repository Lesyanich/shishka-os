# LightRAG server — GCP VM deployment
# Run via start.sh which fetches secrets from GCP Secret Manager.
#
# Refs: MC 350a6738, spec-lightrag.md

version: "3.8"

services:
  lightrag:
    build: .
    container_name: lightrag-server
    restart: unless-stopped
    ports:
      - "9621:9621"
    volumes:
      - lightrag-data:/var/lib/lightrag-rag-storage
    environment:
      # Secrets injected by start.sh from GCP Secret Manager — never hardcoded
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=${DATABASE_URL}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9621/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  lightrag-data:
    driver: local
